version: '3.8'

services:
  # Java Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: demo-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # 使用宿主机 IP 直接连接 MySQL（腾讯云内网）
      SPRING_DATASOURCE_URL: jdbc:mysql://172.17.0.1:3306/demo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: demo_user
      SPRING_DATASOURCE_PASSWORD: demo123456
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mysql-check

  # React 前端 + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: demo-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  # MySQL 健康检查容器（使用宿主机 MySQL）
  mysql-check:
    image: alpine:latest
    container_name: mysql-check
    restart: "no"
    command: >
      sh -c "echo 'MySQL 使用宿主机服务 (3306 端口)' && sleep 5"
